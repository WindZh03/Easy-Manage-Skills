<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Manager</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">LOCAL SKILLS MANAGER</p>
          <h1>个人 Skills Manager</h1>
          <p class="subtitle">中央目录中的每个一级文件夹都是一个完整项目。</p>
        </div>
        <button id="refresh" class="secondary" type="button">刷新</button>
      </header>

      <section class="library-card">
        <label for="state-file">状态文件</label>
        <form id="state-file-form">
          <input id="state-file" name="state-file" placeholder="例如：~/skills-manager-state.json" autocomplete="off">
          <button type="submit">切换状态文件</button>
        </form>
        <p class="field-help">默认使用 ~/skills-manager-state.json；可在此切换到其他状态文件。</p>
      </section>

      <section class="library-card">
        <label for="library">Skills 中央目录</label>
        <form id="library-form">
          <input id="library" name="library" placeholder="例如：~/Documents/skills-library" autocomplete="off">
          <button type="submit">保存并读取</button>
        </form>
        <p class="field-help">只读取该目录下的一级文件夹，不扫描文件夹内部。</p>
      </section>

      <div id="message" role="status" aria-live="polite"></div>
      <section id="content"></section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
